services:
  calio:
    container_name: calio
    image: gyueon/calio:latest
    ports:
      - "8080:8080"
    env_file:
      - ./.env
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
  redis:
    container_name: redis
    image: redis:7.2
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5
  qdrant:
    container_name: qdrant
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/readyz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s

volumes:
  qdrant_data:
